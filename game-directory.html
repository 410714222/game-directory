<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>遊戲目錄</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Noto+Sans+TC:wght@500;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    </head>
<body>

<header>
    <h1>Game Directory</h1>
    <nav class="filter-nav">
        <button class="filter-btn active" data-target="all">全部</button>
        <button class="filter-btn" data-target="data1.xlsx">NS2</button>
        <button class="filter-btn" data-target="data2.xlsx">A</button>
        <button class="filter-btn" data-target="data3.xlsx">B</button>
        <button class="filter-btn" data-target="data4.xlsx">C</button>
        <button class="filter-btn" data-target="data5.xlsx">D</button>
        <button class="filter-btn" data-target="data6.xlsx">E</button>

    </nav>
</header>

<main id="game-grid" class="game-grid">
    </main>

<div id="game-modal" class="modal">
    <div class="modal-content">
        <span class="close-btn" id="close-modal-btn">&times;</span>
        <h2 id="modal-title"></h2>
        <div class="video-container">
            <iframe id="modal-video" src="" allowfullscreen></iframe>
        </div>
        <p id="modal-desc"></p>
    </div>
</div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
