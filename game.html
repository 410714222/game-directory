<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cyber-Grid 遊戲</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Noto+Sans+TC:wght@500;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>NEON DB</h1>
    <nav class="filter-nav">
        <button class="filter-btn active" onclick="loadData('data1.json', event)">全部</button>
        <button class="filter-btn" onclick="loadData('data2.json', event)">任天堂</button>
        <button class="filter-btn" onclick="loadData('data3.json', event)">競技</button>
        <button class="filter-btn" onclick="loadData('data4.json', event)">冒險</button>
        <button class="filter-btn" onclick="loadData('data5.json', event)">策略</button>
    </nav>
</header>

<main id="game-grid" class="game-grid">
    </main>

<div id="game-modal" class="modal">
    <div class="modal-content">
        <span class="close-btn" onclick="closeModal()">&times;</span>
        <h2 id="modal-title"></h2>
        <div class="video-container">
            <iframe id="modal-video" src="" allowfullscreen></iframe>
        </div>
        <p id="modal-desc"></p>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
